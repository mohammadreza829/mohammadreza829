<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="250" viewBox="0 0 1000 250">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29">
        <animate attributeName="stop-color" values="#0f0c29;#302b63;#24243e;#0f0c29" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#302b63">
        <animate attributeName="stop-color" values="#302b63;#24243e;#0f0c29;#302b63" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#24243e">
        <animate attributeName="stop-color" values="#24243e;#0f0c29;#302b63;#24243e" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#36bcf7"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="250" rx="16" fill="url(#bg)"/>

  <!-- floating particles -->
  <circle cx="90" cy="200" r="3" fill="#36bcf7" opacity="0.6">
    <animate attributeName="cy" values="200;50;200" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="70" r="2" fill="#a78bfa" opacity="0.5">
    <animate attributeName="cy" values="70;190;70" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="180" r="3" fill="#f472b6" opacity="0.6">
    <animate attributeName="cy" values="180;40;180" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="930" cy="60" r="2" fill="#36bcf7" opacity="0.5">
    <animate attributeName="cy" values="60;200;60" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="30" r="2" fill="#a78bfa" opacity="0.4">
    <animate attributeName="cy" values="30;70;30" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- decorative code symbols -->
  <text x="70" y="140" font-family="'Fira Code', monospace" font-size="48" fill="#36bcf7" opacity="0.35">{ }
    <animate attributeName="opacity" values="0.35;0.7;0.35" dur="4s" repeatCount="indefinite"/>
  </text>
  <text x="860" y="140" font-family="'Fira Code', monospace" font-size="48" fill="#f472b6" opacity="0.35">&lt;/&gt;
    <animate attributeName="opacity" values="0.35;0.7;0.35" dur="4s" begin="2s" repeatCount="indefinite"/>
  </text>

  <!-- name -->
  <text x="500" y="118" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700" fill="url(#txt)">Mohammadreza Fasli</text>

  <!-- subtitle -->
  <text x="500" y="162" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#c9d1d9" letter-spacing="3">BACKEND DEVELOPER • PYTHON &amp; DJANGO • ML EXPLORER</text>

  <!-- animated underline -->
  <rect x="400" y="182" width="200" height="3" rx="1.5" fill="url(#txt)">
    <animate attributeName="x" values="400;370;400" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="width" values="200;260;200" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
